spring:
  docker:
    compose:
      stop:
        command: down
  application:
    name: regulus
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer_uri: ${OAUTH2_ISSUER_URI:http://localhost:9000}
            jwk_set_uri: ${OAUTH2_JWK_SET_URI:http://localhost:9000/oauth/jwks}

regulus:
  providers:
    geocode:
      api-key: test
